<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0f172a" />
    <title>纳斯达克基金限额看板</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <svg class="brand-mark" viewBox="0 0 48 48" aria-hidden="true">
          <rect x="6" y="8" width="36" height="32" rx="8"></rect>
          <path d="M14 31h20M14 24h7m5 0h8M14 17h20"></path>
        </svg>
        <div>
          <h1>纳斯达克基金限额看板</h1>
          <p id="updatedAt">数据加载中</p>
        </div>
      </div>
      <a class="source-link" href="https://fund.eastmoney.com/" target="_blank" rel="noreferrer">
        天天基金
      </a>
    </header>

    <main class="shell">
      <section class="metrics" aria-label="统计摘要">
        <div class="metric">
          <span>监控基金</span>
          <strong id="metricTotal">--</strong>
        </div>
        <div class="metric">
          <span>限额变化</span>
          <strong id="metricLimitChanged">--</strong>
        </div>
        <div class="metric">
          <span>限额状态</span>
          <strong id="metricLimited">--</strong>
        </div>
        <div class="metric">
          <span>获取异常</span>
          <strong id="metricErrors">--</strong>
        </div>
      </section>

      <section class="changes" id="changesSection" aria-label="今日变化"></section>

      <section class="toolbar" aria-label="筛选">
        <div class="search-wrap">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="11" cy="11" r="7"></circle>
            <path d="m16.5 16.5 4 4"></path>
          </svg>
          <input id="searchInput" type="search" placeholder="搜索代码或名称" autocomplete="off" />
        </div>
        <div class="status-tabs" id="statusTabs" aria-label="状态筛选"></div>
      </section>

      <nav class="group-tabs" id="groupTabs" aria-label="基金分组"></nav>

      <section class="fund-list" id="fundList" aria-live="polite"></section>

      <section class="empty-state" id="emptyState" hidden>
        <h2>没有匹配的基金</h2>
        <p>调整搜索词或筛选条件后再试。</p>
      </section>
    </main>

    <footer class="footer">
      <p id="disclaimer">数据来自公开页面，交易前请以实际下单平台为准。本页面不构成投资建议。</p>
    </footer>

    <script src="./app.js" defer></script>
  </body>
</html>
