name: Daily Fund Limit Monitor

on:
  schedule:
    # 08:30 Asia/Shanghai = 00:30 UTC
    - cron: "30 0 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  push-and-publish:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore monitor state
        uses: actions/cache@v4
        with:
          path: .fund_limit_state.json
          key: fund-limit-state-${{ github.run_id }}
          restore-keys: |
            fund-limit-state-

      - name: Run monitor
        env:
          FUND_NOTIFY_ENABLED: "true"
          FUND_NOTIFY_CHANNEL: "serverchan"
          SERVERCHAN_SENDKEY: ${{ secrets.SERVERCHAN_SENDKEY }}
        run: python3 fund_limit_monitor.py --config config.example.json --site-output public/data/latest.json

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
